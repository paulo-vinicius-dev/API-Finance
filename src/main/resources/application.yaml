spring:
  application:
    name: finance

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  sql:
    init:
      mode: always
      platform: postgres

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${SECRET_KEY}
    access-token-expiry-seconds: ${ACCESS_TOKEN_EXPIRY_SECONDS}
    refresh-token-expiry-seconds: ${REFRESH_TOKEN_EXPIRY_SECONDS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    groups-order: ASC
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false

logging:
  file:
    name: logs/app.log
  level:
    root: INFO
    br.com.pauloviniciusdeveloper.books.auth: INFO
    br.com.pauloviniciusdeveloper.books.common.security: DEBUG
