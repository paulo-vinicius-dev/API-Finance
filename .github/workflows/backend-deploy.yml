name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B -q

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/finance-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKER_USERNAME }}/finance-backend:latest"

            echo "Pulling latest image..."
            docker pull "$IMAGE"

            echo "Stopping old container (if running)..."
            docker stop finance-backend || true
            docker rm finance-backend || true

            echo "Starting new container..."
            docker run -d \
              --name finance-backend \
              --restart unless-stopped \
              --network finance-net \
              -p 8080:8080 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DATABASE_USERNAME="${{ secrets.DATABASE_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ACCESS_TOKEN_EXPIRY_SECONDS="${{ secrets.ACCESS_TOKEN_EXPIRY_SECONDS }}" \
              -e REFRESH_TOKEN_EXPIRY_SECONDS="${{ secrets.REFRESH_TOKEN_EXPIRY_SECONDS }}" \
              "$IMAGE"

            echo "Waiting for health check..."
            sleep 15
            docker inspect --format='{{.State.Health.Status}}' finance-backend

            echo "Removing dangling images..."
            docker image prune -f
